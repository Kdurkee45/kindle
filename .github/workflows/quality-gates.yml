name: Quality Gates

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test"
        required: false
        type: string
        default: '["3.11", "3.12"]'
      coverage-threshold:
        description: "Minimum coverage percentage"
        required: false
        type: number
        default: 80
      upload-coverage:
        description: "Upload coverage report as artifact"
        required: false
        type: boolean
        default: false

jobs:
  quality:
    name: "Quality Gates (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/kindle/

      - name: Clean bytecache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Test with coverage (pytest)
        run: uv run pytest --cov=kindle --cov-report=xml --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        if: always() && inputs.upload-coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
